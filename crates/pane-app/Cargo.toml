[package]
name = "pane-app"
version = "0.1.0"
edition = "2021"
description = "Application kit for the pane desktop environment. The developer's primary interface for building pane-native applications."
license = "BSD-3-Clause"

[dependencies]
calloop = "0.14"
libc = "0.2"
pane-optic = { path = "../pane-optic" }
pane-proto = { path = "../pane-proto" }
pane-session = { path = "../pane-session" }
uuid = { version = "1", features = ["v4"] }

[dev-dependencies]
tempfile = "3"
uuid = { version = "1", features = ["v4"] }
