[package]
name = "pane-session"
version = "0.1.0"
edition = "2021"
description = "IPC adaptation of par's CLL session types for the pane protocol framework."
license = "BSD-3-Clause"

[dependencies]
par = { version = "0.3.10", default-features = false }
fp-library = { version = "0.15", features = ["serde", "rayon"] }
serde = { version = "1", features = ["derive"] }
postcard = { version = "1", features = ["alloc"] }
