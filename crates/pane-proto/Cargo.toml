[package]
name = "pane-proto"
version = "0.1.0"
edition = "2021"
description = "Wire types and session protocol definitions for the pane desktop environment"
license = "BSD-3-Clause"

[dependencies]
serde = { version = "1", features = ["derive"] }
postcard = { version = "1", features = ["alloc"] }
bitflags = { version = "2", features = ["serde"] }
pane-session = { path = "../pane-session" }

[dev-dependencies]
proptest = "1"
