[package]
name = "pane-proto"
version = "0.1.0"
edition = "2021"
description = "Wire types and session protocol definitions for the pane desktop environment"
license = "MIT"

[dependencies]
serde = { version = "1", features = ["derive"] }
postcard = { version = "1", features = ["alloc"] }
bitflags = { version = "2", features = ["serde"] }

[dev-dependencies]
proptest = "1"
